<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>New Desktop Frame</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="content-wrap">
        <div class="content-header">
            <nav class="toolbar nav-bar" id="nav-bar" role="toolbar" aria-label="Navigation">
                <fluent-button appearance="subtle" class="nav-button is-active" data-content="summary-view" id="summary-btn" title="Summary" aria-label="Summary Selected">
                    <span slot="start" aria-hidden="true"><span class="fluent-icon"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a8 8 0 110 16 8 8 0 010-16zm0 1a7 7 0 100 14 7 7 0 000-14zm0 3a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 7.5a.75.75 0 100-1.5.75.75 0 000 1.5z"/></svg></span></span>
                    <span class="button-label">Summary</span>
                </fluent-button>
                <fluent-button appearance="subtle" class="nav-button" data-content="received-view" id="received-btn" title="Received" aria-label="Received">
                    <span slot="start" aria-hidden="true"><span class="fluent-icon"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a8 8 0 110 16 8 8 0 010-16zm0 1a7 7 0 100 14 7 7 0 000-14zm-.25 2.5a.75.75 0 01.75.75v3.69l2.28 2.28a.75.75 0 01-1.06 1.06l-2.5-2.5a.75.75 0 01-.22-.53V6.25a.75.75 0 01.75-.75z"/></svg></span></span>
                    <span class="button-label">Received</span>
                </fluent-button>
                <fluent-button appearance="subtle" class="nav-button" data-content="antispam-view" id="antispam-btn" title="Antispam" aria-label="Antispam">
                    <span slot="start" aria-hidden="true"><span class="fluent-icon"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2.5l7.5 3.75v3.75c0 4.14-3.21 7.3-7.5 8.5-4.29-1.2-7.5-4.36-7.5-8.5V6.25L10 2.5zm0 1.34L3.5 7v3c0 3.53 2.77 6.24 6.5 7.38 3.73-1.14 6.5-3.85 6.5-7.38V7L10 3.84zM10 6a.5.5 0 01.5.5v4a.5.5 0 01-1 0v-4A.5.5 0 0110 6zm0 7a.62.62 0 100-1.25.62.62 0 000 1.25z"/></svg></span></span>
                    <span class="button-label">Antispam</span>
                </fluent-button>
                <fluent-button appearance="subtle" class="nav-button" data-content="other-view" id="other-btn" title="Other" aria-label="Other">
                    <span slot="start" aria-hidden="true"><span class="fluent-icon"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M3 4.5A1.5 1.5 0 014.5 3h11A1.5 1.5 0 0117 4.5v11a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 013 15.5v-11zM4.5 4a.5.5 0 00-.5.5v11a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-11a.5.5 0 00-.5-.5h-11zM6 7.5a.5.5 0 01.5-.5h7a.5.5 0 010 1h-7a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h7a.5.5 0 010 1h-7a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h4a.5.5 0 010 1h-4a.5.5 0 01-.5-.5z"/></svg></span></span>
                    <span class="button-label">Other</span>
                </fluent-button>
            </nav>
        </div>
        <div class="content-main">
            <div class="overlay" id="loading-overlay">
                <div class="status-display">
                    <div id="status-message"></div>
                    <fluent-progress-ring class="status-spinner"></fluent-progress-ring>
                </div>
            </div>
            <div id="error-display" class="error-message" hidden>
                <fluent-card class="error-card">
                    <div class="error-content">
                        <span class="fluent-icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a8 8 0 110 16 8 8 0 010-16zm0 1a7 7 0 100 14 7 7 0 000-14zm3.45 4.15a.5.5 0 01.05.64l-.05.06L10.7 10l2.75 2.15a.5.5 0 01-.56.84l-.06-.04L10 10.72l-2.83 2.23a.5.5 0 01-.67-.74l.05-.06L9.3 10 6.55 7.85a.5.5 0 01.56-.84l.06.04L10 9.28l2.83-2.23a.5.5 0 01.62.1z"/></svg></span>
                        <div class="error-text"></div>
                    </div>
                </fluent-card>
            </div>
            <div class="header-view" data-content="summary-view">
                <div class="summary-list"></div>
                <div class="ui-diagnostics-report-section"></div>
                <div class="orig-header-ui">
                    <fluent-button id="orig-header-btn" appearance="accent" aria-expanded="false" aria-label="Toggle original headers display">
                        <span slot="start" class="fluent-icon fluent-icon--toggle" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M7.65 4.15c.2-.2.5-.2.7 0l5.49 5.46c.2.2.2.52 0 .71l-5.49 5.46a.5.5 0 01-.7-.7L12.8 10 7.65 4.85a.5.5 0 010-.7z"/></svg></span>
                        Original Headers
                    </fluent-button>
                    <div id="original-headers" class="code-box">
                        <textarea readonly aria-label="Original email headers" title="Original email headers"></textarea>
                    </div>
                </div>
            </div>
            <div class="header-view" data-content="received-view">
                <div class="received-list"></div>
            </div>
            <div class="header-view" data-content="antispam-view">
                <div class="antispam-list"></div>
            </div>
            <div class="header-view" data-content="other-view">
                <div class="other-list"></div>
            </div>
        </div>
    </div>

    <!-- Static HTML Templates -->
    <template id="summary-row-template">
        <div class="section-header"></div>
        <div class="code-box">
            <pre><code></code></pre>
        </div>
    </template>

    <template id="hop-header-template">
        <div class="hop-details-header">
            <h2 class="hop-title">Hop Details</h2>
        </div>
    </template>

    <template id="forefront-header-template">
        <div class="section-header">Forefront Antispam Report</div>
        <hr/>
    </template>

    <template id="microsoft-header-template">
        <div class="section-header">Microsoft Antispam Report</div>
        <hr/>
    </template>

    <template id="table-row-template">
        <tr class="popover-row">
            <td class="popover-cell row-header"></td>
            <td class="popover-cell">
                <div class="cell-content-wrapper">
                    <div class="cell-main-content"></div>
                        <fluent-button appearance="subtle" size="small" class="show-diagnostics-popover-btn">
                        <span class="severity-icon" aria-hidden="true"></span>
                    </fluent-button>
                </div>
                <div class="details-overlay-popup is-hidden">
                    <div class="popover-content">
                        <div class="diagnostics-list"></div>
                    </div>
                </div>
            </td>
        </tr>
    </template>

    <template id="selection-target-template">
        <div class="hop-list-selection"></div>
    </template>

    <template id="other-row-template">
        <div class="other-header-wrapper">
            <div class="row-header"></div>
            <fluent-button appearance="subtle" size="small" class="show-diagnostics-popover-btn">
                <span class="severity-icon" aria-hidden="true"></span>
            </fluent-button>
        </div>
        <div class="code-box">
            <pre><code class="cell-main-content"></code></pre>
        </div>
        <div class="details-overlay-popup is-hidden">
            <div class="popover-content">
                <div class="diagnostics-list"></div>
            </div>
        </div>
    </template>

    <template id="hop-entry-template">
        <p class="hop-details-entry">
            <span class="hop-label"></span>
            <span class="hop-value"></span>
        </p>
    </template>

    <template id="first-row-template">
        <span class="hop-primary-text">
            <span class="hop-label">From: </span>
            <span class="from-value"></span>
        </span>
        <span class="hop-secondary-text">
            <span class="hop-label">To: </span>
            <span class="to-value"></span>
        </span>
    </template>

    <template id="secondary-text-template">
        <span class="hop-secondary-text">
            <span class="hop-label">To: </span>
            <span class="to-value"></span>
        </span>
    </template>

    <template id="received-list-template">
        <ul class="hop-list"></ul>
    </template>

    <template id="list-item-template">
        <li class="hop-list-item" tabindex="0"></li>
    </template>

    <template id="progress-icon-template">
        <div class="progress-icon">
            <div class="down-icon">
                <span class="fluent-icon"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2.5a.5.5 0 01.5.5v11.8l3.64-3.65a.5.5 0 01.72.71l-4.5 4.5a.5.5 0 01-.72 0l-4.5-4.5a.5.5 0 01.72-.71l3.64 3.65V3a.5.5 0 01.5-.5z"/></svg></span>
            </div>
            <div class="progress-container">
                <fluent-progress class="hop-progress"></fluent-progress>
                <div class="progress-description"></div>
            </div>
        </div>
    </template>

    <template id="hop-template">
        <div class="details-overlay-popup is-hidden">
            <div class="hop-details-content"></div>
        </div>
    </template>

    <template id="diagnostics-accordion-template">
        <fluent-accordion class="diagnostics-accordion"></fluent-accordion>
    </template>

    <template id="diagnostic-accordion-item-template">
        <fluent-accordion-item>
            <div slot="heading" class="violation-card-header">
                <fluent-badge class="severity-badge"></fluent-badge>
                <div class="violation-message"></div>
            </div>
            <div class="diagnostic-content"></div>
        </fluent-accordion-item>
    </template>

    <template id="violation-inline-template">
        <span class="violation-inline">
            <fluent-badge class="severity-badge"></fluent-badge>
            <span class="violation-message"></span>
        </span>
    </template>

    <template id="violation-card-template">
        <div class="violation-card">
            <div class="violation-card-header">
                <fluent-badge class="severity-badge"></fluent-badge>
                <span class="violation-message"></span>
            </div>
            <div class="violation-details">
                <div class="violation-rule"></div>
                <div class="violation-parent-message"></div>
            </div>
        </div>
    </template>
</body>
</html>
