<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <title>Message Header Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
    <div class="content-wrap">
        <!-- Standalone input area -->
        <header class="standalone-header">
            <h1 class="standalone-title">Message Header Analyzer</h1>
            <div class="standalone-controls">
                <fluent-button id="themeToggleBtn" aria-label="Change theme" title="Change theme">
                    <span id="themeLabel">Theme</span>
                </fluent-button>
                <fluent-button id="darkModeToggleBtn" aria-label="Toggle appearance" title="Toggle appearance">
                    <span id="darkModeIcon">Light</span>
                </fluent-button>
            </div>
        </header>
        <section class="standalone-input" role="region" aria-label="Input Headers">
            <textarea id="inputHeaders" autofocus="autofocus" placeholder="Paste headers here." required="required"
                rows="10"></textarea>
            <div class="standalone-actions">
                <fluent-button appearance="accent" id="analyzeButton" aria-label="Analyze message headers">
                    Analyze headers
                </fluent-button>
                <fluent-button id="clearButton" class="hiddenElement" aria-label="Clear input and results">
                    Clear
                </fluent-button>
                <fluent-button id="copyButton" class="hiddenElement" aria-label="Copy analysis results">
                    <span class="fluent-icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M8 2a2 2 0 00-2 2v10a2 2 0 002 2h6a2 2 0 002-2V4a2 2 0 00-2-2H8zM7 4a1 1 0 011-1h6a1 1 0 011 1v10a1 1 0 01-1 1H8a1 1 0 01-1-1V4zM4 6a2 2 0 00-2 2v6a4 4 0 004 4h4a2 2 0 002-2h-1a1 1 0 01-1 1H6a3 3 0 01-3-3V8a1 1 0 011-1V6z"/></svg></span> Copy
                </fluent-button>
                <div class="status-overlay status-overlay-inline" id="statusMessage" role="status" aria-live="polite"></div>
                <span class="standalone-spacer"></span>
                <span id="buildInfo" class="standalone-build-info"></span>
                <a href="https://github.com/microsoft/MHA" target="_blank" rel="noopener" class="standalone-feedback">Feedback</a>
            </div>
        </section>

        <!-- Results rendered by Lit component -->
        <mha-results hidden></mha-results>
    </div>
</body>

</html>
