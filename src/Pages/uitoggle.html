<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Message Header Analyzer - Analyze email headers for security and troubleshooting" />
    <meta name="theme-color" content="#0072cc" />
    <title>Message Header Analyzer</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
    <main id="uiToggleFrame">
        <header class="header-row">
            <nav class="toolbar" role="toolbar" aria-label="Main actions">
                <fluent-button appearance="subtle" id="copyButton" aria-label="Copy message header">
                    <span slot="start" class="fluent-icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M8 2a2 2 0 00-2 2v10a2 2 0 002 2h6a2 2 0 002-2V4a2 2 0 00-2-2H8zM7 4a1 1 0 011-1h6a1 1 0 011 1v10a1 1 0 01-1 1H8a1 1 0 01-1-1V4zM4 6a2 2 0 00-2 2v6a4 4 0 004 4h4a2 2 0 002-2h-1a1 1 0 01-1 1H6a3 3 0 01-3-3V8a1 1 0 011-1V6z"/></svg></span>
                </fluent-button>
                <fluent-button appearance="subtle" id="settingsButton" aria-label="Open settings">
                    <span slot="start" class="fluent-icon" aria-hidden="true"><svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M1.91 7.38l1.18-.47c.2-.55.47-1.07.8-1.55L3.5 4.1a.5.5 0 01.06-.57l1.07-1.07a.5.5 0 01.57-.06l1.26.39c.48-.33 1-.6 1.55-.8l.47-1.18A.5.5 0 019 .5h1.5a.5.5 0 01.47.31l.47 1.18c.55.2 1.07.47 1.55.8l1.26-.39a.5.5 0 01.57.06l1.07 1.07a.5.5 0 01.06.57l-.39 1.26c.33.48.6 1 .8 1.55l1.18.47a.5.5 0 01.31.47v1.5a.5.5 0 01-.31.47l-1.18.47c-.2.55-.47 1.07-.8 1.55l.39 1.26a.5.5 0 01-.06.57l-1.07 1.07a.5.5 0 01-.57.06l-1.26-.39c-.48.33-1 .6-1.55.8l-.47 1.18a.5.5 0 01-.47.31H9a.5.5 0 01-.47-.31l-.47-1.18c-.55-.2-1.07-.47-1.55-.8l-1.26.39a.5.5 0 01-.57-.06L3.61 14.1a.5.5 0 01-.06-.57l.39-1.26c-.33-.48-.6-1-.8-1.55l-1.18-.47A.5.5 0 011.65 9.8V8.3c0-.2.12-.39.31-.47zm1.34 1.75c.21.72.55 1.39 1 1.98l-.46 1.5.73.73 1.5-.46a5.53 5.53 0 001.98 1l.56 1.41h1.04l.56-1.41c.72-.21 1.39-.55 1.98-1l1.5.46.73-.73-.46-1.5c.45-.59.79-1.26 1-1.98l1.41-.56V7.55l-1.41-.56a5.53 5.53 0 00-1-1.98l.46-1.5-.73-.73-1.5.46a5.53 5.53 0 00-1.98-1L10.3 1.82H9.26l-.56 1.41c-.72.21-1.39.55-1.98 1l-1.5-.46-.73.73.46 1.5c-.45.59-.79 1.26-1 1.98l-1.41.56v1.04l1.41.56zM10 7a2.5 2.5 0 100 5 2.5 2.5 0 000-5zM8.5 9.5a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z"/></svg></span>
                </fluent-button>
            </nav>
        </header>

        <!-- Status message overlay positioned as true overlay -->
        <div id="statusMessage" class="status-overlay status-overlay-fixed" role="status" aria-live="polite">
        </div>

        <section class="frame-row">
            <iframe id="uiFrame" src="newDesktopFrame.html" title="Message Header Analyzer" sandbox="allow-scripts allow-same-origin"></iframe>
        </section>

        <!-- Settings Dialog -->
        <fluent-dialog id="dialog-Settings" aria-label="Settings" hidden>
            <header class="dialog-header">
                <h2 id="settings-title">Settings</h2>
            </header>
            <section class="dialog-content">
                <fieldset>
                    <legend id="Label-Theme">Theme</legend>
                    <fluent-radio-group orientation="vertical" id="themeChoice" name="themeChoice" aria-label="Choose visual theme" aria-labelledby="Label-Theme">
                        <fluent-radio value="default">Default</fluent-radio>
                        <fluent-radio value="fluent-refresh">Fluent Refresh</fluent-radio>
                        <fluent-radio value="glassmorphism">Glassmorphism</fluent-radio>
                        <fluent-radio value="minimal-mono">Minimal Mono</fluent-radio>
                        <fluent-radio value="neon-grid">Neon Grid</fluent-radio>
                        <fluent-radio value="warm-earth">Warm Earth</fluent-radio>
                        <fluent-radio value="aurora-nord">Aurora Nord</fluent-radio>
                    </fluent-radio-group>
                </fieldset>
                <fieldset>
                    <legend id="Label-Mode">Appearance</legend>
                    <fluent-radio-group orientation="vertical" id="modeChoice" name="modeChoice" aria-label="Choose color mode" aria-labelledby="Label-Mode">
                        <fluent-radio value="system">System</fluent-radio>
                        <fluent-radio value="light">Light</fluent-radio>
                        <fluent-radio value="dark">Dark</fluent-radio>
                    </fluent-radio-group>
                </fieldset>
                <fluent-checkbox id="telemetryInput">Send telemetry</fluent-checkbox>
                <div class="privacy-link">
                    <small>
                        <a href="privacy.html" id="privacy-link" target="_blank" rel="noopener noreferrer" aria-label="View privacy policy (opens in new tab)">privacy policy</a>
                    </small>
                </div>
            </section>
            <footer class="dialog-actions">
                <fluent-button id="actionsSettings-diag" aria-label="Open diagnostics">Diagnostics</fluent-button>
                <fluent-button appearance="accent" id="actionsSettings-OK" aria-label="Save settings and close">OK</fluent-button>
            </footer>
        </fluent-dialog>

        <!-- Diagnostics Dialog -->
        <fluent-dialog id="dialog-Diagnostics" aria-label="Diagnostics" hidden>
            <header class="dialog-header">
                <h2 id="diagnostics-title">Diagnostics</h2>
            </header>
            <section class="dialog-content">
                <div class="code-box">
                    <pre tabindex="0" id="diagpre" aria-label="Diagnostic information"><code id="diagnostics"></code></pre>
                </div>
            </section>
            <footer class="dialog-actions">
                <fluent-button appearance="accent" id="actionsDiag-OK" aria-label="Close diagnostics">OK</fluent-button>
            </footer>
        </fluent-dialog>
    </main>
</body>
</html>
